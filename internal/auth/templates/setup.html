<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pukiwiki-mcp セットアップ</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 480px;
        margin: 60px auto;
        padding: 0 16px;
        color: #333;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 4px;
      }
      p.desc {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: bold;
        margin-bottom: 4px;
        margin-top: 16px;
      }
      input[type="text"],
      input[type="password"],
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }
      .optional {
        font-weight: normal;
        color: #999;
        font-size: 0.8rem;
      }
      .error {
        color: #c00;
        background: #fff0f0;
        border: 1px solid #c00;
        border-radius: 4px;
        padding: 8px 12px;
        margin-bottom: 16px;
        font-size: 0.9rem;
      }
      button {
        margin-top: 24px;
        width: 100%;
        padding: 10px;
        background: #0070f3;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #0051a8;
      }
    </style>
  </head>
  <body>
    <h1>セットアップ</h1>
    <p class="desc">PukiWiki の接続情報を入力してください。</p>
    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/submit">
      <label for="url">PukiWiki URL</label>
      <input
        type="url"
        id="url"
        name="url"
        placeholder="https://wiki.example.com"
        value="{{.URL}}"
        required
      />

      <label for="username">ユーザー名</label>
      <input
        type="text"
        id="username"
        name="username"
        value="{{.Username}}"
        required
      />

      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" />

      <label for="scope">スコープ <span class="optional">(任意)</span></label>
      <input
        type="text"
        id="scope"
        name="scope"
        placeholder="user/yourname"
        value="{{.Scope}}"
      />
      <p>スコープは MCP tools でアクセスできる範囲を設定します。</p>
      <p>
        例: seminar/username の場合、seminar/username
        以下のページにアクセス可能です。
      </p>

      <button type="submit">保存して続ける</button>
    </form>
  </body>
</html>
