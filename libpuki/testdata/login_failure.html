<!doctype html>
<html>
  <head>
    <title>Login</title>
  </head>
  <body>
    <form
      name="loginform"
      class="loginform"
      action="/?plugin=loginform"
      method="post"
    >
      <table>
        <tr>
          <td>Username</td>
          <td><input type="text" name="username" /></td>
        </tr>
        <tr>
          <td>Password</td>
          <td><input type="password" name="password" /></td>
        </tr>
        <tr>
          <td></td>
          <td class="errormessage">Invalid username or password</td>
        </tr>
      </table>
    </form>
  </body>
</html>
